<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg?v=2" />
    <link rel="shortcut icon" href="/logo.svg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HyruleDex — Enciclopedia de Zelda</title>
    <script>
      // Prevent flash of wrong theme on initial load
      (function() {
        try {
          const store = JSON.parse(localStorage.getItem('hyruledex-store') || '{}');
          const theme = store.state?.theme || 'dark';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          }
        } catch(e) {
          // Default to dark theme
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
